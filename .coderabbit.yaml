# yaml-language-server: $schema=https://storage.googleapis.com/coderabbit_public_assets/schema.v2.json

language: en-US
tone_instructions: ""
early_access: true
enable_free_tier: true
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: false
  auto_title_placeholder: "@coderabbitai"
  auto_title_instructions: ""
  review_status: true
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  auto_apply_labels: false
  suggested_reviewers: true
  auto_assign_reviewers: false
  poem: false
  labeling_instructions:
    - label: ""
      instructions: ""
  path_filters: ['!src/ignoreFolder']
  path_instructions:
  - path: "*"
    instructions: 
      "User clear structure and naming conventions for functions, constants etc \n.
      Proviede readable and maintainable syntax\n
      Check the proper use of test.describe, test.beforeEach, test.afterEach.\n
      Use test.describe in files with more than 1 test.\n
      Using locators over selectors like page.$()\n
      Waiting for elements using Playwright’s auto-waiting instead of manual waitForTimeout\n
      Avoid using hardcoded timeouts and selectors\n
      Test names should clearly describe behavior\n 
      Shared setup logic should be extracted into fixtures or helper functions\n 
      Avoid unnecessary navigation or reloading\n 
      Avoid duplicated setup steps across tests\n 
      Suggest improvements or refactorings\n 
      Point out any flaky patterns or potential for better abstraction\n
      Highlight code duplication and proposition for its refactoring\n
      Review the TypeScript, JavaScript code for best practices.\n
      Check for common security vulnerabilities,\n 
      such as SQL injection, insecure dependencies, and sensitive data exposure."
  abort_on_close: true
  disable_cache: false
  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords: [noreview]
    labels: []
    drafts: false
    base_branches: []
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
  tools:
    ast-grep:
      rule_dirs: []
      util_dirs: []
      essential_rules: true
      packages: []
    shellcheck:
      enabled: true
    ruff:
      enabled: true
    markdownlint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000
    languagetool:
      enabled: true
      enabled_rules: []
      disabled_rules: []
      enabled_categories: []
      disabled_categories: []
      enabled_only: false
      level: default
    biome:
      enabled: true
    hadolint:
      enabled: true
    swiftlint:
      enabled: true
      config_file: ""
    phpstan:
      enabled: true
      level: default
    golangci-lint:
      enabled: true
      config_file: ""
    yamllint:
      enabled: true
    gitleaks:
      enabled: true
    checkov:
      enabled: true
    detekt:
      enabled: true
      config_file: ""
    eslint:
      enabled: true
    rubocop:
      enabled: true
    buf:
      enabled: true
    regal:
      enabled: true
    actionlint:
      enabled: true
    pmd:
      enabled: true
      config_file: ""
    cppcheck:
      enabled: true
    semgrep:
      enabled: true
      config_file: ""
    circleci:
      enabled: true
    clippy:
      enabled: true
    sqlfluff:
      enabled: true
    prismaLint:
      enabled: true
    pylint:
      enabled: true
    oxc:
      enabled: true
    shopifyThemeCheck:
      enabled: true
    luacheck:
      enabled: true
    brakeman:
      enabled: true
    dotenvLint:
      enabled: true
    htmlhint:
      enabled: false
      config_file: ""
    checkmake:
      enabled: true
chat:
  auto_reply: true
  integrations:
    jira:
      usage: auto
    linear:
      usage: auto
knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns: []
  learnings:
    scope: auto
  issues:
    scope: auto
  jira:
    usage: auto
    project_keys: []
  linear:
    usage: auto
    team_keys: []
  pull_requests:
    scope: auto
code_generation:
  docstrings:
    language: en-US
    path_instructions:
      - path: ""
        instructions: ""
  unit_tests:
    path_instructions:
      - path: ""
        instructions: ""